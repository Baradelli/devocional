packages:
  - 'packages/*'

# Scripts de build: aprovados os necessários (Prisma + esbuild),
# negados os nativos opcionais que vêm via Testcontainers/ssh2.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  esbuild: true
  cpu-features: false
  protobufjs: false
  ssh2: false

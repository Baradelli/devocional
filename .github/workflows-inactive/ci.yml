name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela execuções antigas do mesmo ref quando chega um push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gera o client do Prisma — os tipos são necessários para typecheck e lint.
      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Integração sobe Postgres via Testcontainers (Docker disponível no runner).
      - name: Test
        run: pnpm test
